services:
  reader:
    build: .
    image: crs-quota-reader:latest
    container_name: crs-quota-reader
    restart: unless-stopped
    ports:
      - "127.0.0.1:8788:8788"
    env_file:
      - .env
    # If your CRS runs in another compose project on a named network,
    # uncomment and adjust below so this container can reach the same Redis.
    # networks:
    #   - crs-net
# networks:
#   crs-net:
#     external: true
#     name: claude-relay-service_default
